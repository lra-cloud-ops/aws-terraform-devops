name: CI/CD Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  AWS_REGION: eu-west-1
  TF_DIR: terraform/
  CLUSTER_NAME: dev-cluster
jobs:
  sonarcloud:
    name: Tests and SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov boto3 botocore flask
      - name: Configure Python path
        run: echo "PYTHONPATH=$PWD/docker/src:$PWD/scripts" >> $GITHUB_ENV
      - name: Run tests with coverage
        run: |
          pytest scripts/tests/ docker/src/tests/ \
            --cov=docker/src \
            --cov=scripts \
            --cov-config=.coveragerc \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --verbose
      - name: Execute SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  terraform:
    name: Terraform Validate and Plan
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: ${{ github.event_name == 'push' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::522921482434:role/github-actions-terraform-devops
          aws-region: ${{ env.AWS_REGION }}
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: Initialize Terraform
        working-directory: ${{ env.TF_DIR }}
        run: terraform init
      - name: Check Terraform format
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive
      - name: Validate Terraform configuration
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate
      - name: Generate Terraform execution plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var-file=../environments/dev/terraform.tfvars \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            -out=tfplan
      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_DIR }}/tfplan